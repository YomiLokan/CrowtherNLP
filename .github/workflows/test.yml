name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and test dependencies
        run: |
          python -m pip install -e .
          python -m pip install pytest fastapi uvicorn httpx PyYAML

      - name: Run test suite
        run: python -m pytest -q

      - name: Check OpenAPI parity
        run: python scripts/check_openapi.py

      - name: Check migration contract parity
        run: python scripts/check_migration_contract.py

      - name: Check docs migration contract parity
        run: python scripts/check_docs_migration_contract.py
