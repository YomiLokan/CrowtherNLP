name: Evaluate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          python -m pip install -e .
          python -m pip install fastapi uvicorn httpx pytest PyYAML

      - name: Run benchmark comparator
        run: |
          python benchmarks/evaluate.py \
            --gold benchmarks/data/gold_words.jsonl \
            --models baseline,rules,hybrid \
            --json-out benchmarks/results/latest.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/latest.json
